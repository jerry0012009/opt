    location = /codex {
        return 301 /codex/;
    }

    location = /codex/terminal {
        return 301 /codex/terminal/;
    }

    location = /codex/ide {
        return 301 /codex/ide/;
    }

    location = /codex/ttyd {
        return 301 /codex/ttyd/;
    }

    location = /codex/control {
        return 301 /codex/terminal/;
    }

    location /codex/control/ {
        return 301 /codex/terminal/;
    }

    location /codex/ide/ {
        auth_basic "Codex Workbench";
        auth_basic_user_file /etc/nginx/codex-workbench.htpasswd;

        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /codex/ide;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location /codex/ttyd/ {
        auth_basic "Codex Workbench";
        auth_basic_user_file /etc/nginx/codex-workbench.htpasswd;

        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Remote-User $remote_user;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location /codex/terminal/ {
        auth_basic "Codex Workbench";
        auth_basic_user_file /etc/nginx/codex-workbench.htpasswd;

        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /codex/ {
        auth_basic "Codex Workbench";
        auth_basic_user_file /etc/nginx/codex-workbench.htpasswd;

        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
